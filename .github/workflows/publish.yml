name: Publish to npm

on:
  push:
    tags: ['v*']

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          registry-url: 'https://registry.npmjs.org'
      - run: npm ci
      - run: npx ng build ngx-dadata --configuration production
      - name: Copy assets to dist
        run: |
          cp README.md dist/ngx-dadata/
          cp LICENSE dist/ngx-dadata/
          cp CHANGELOG.md dist/ngx-dadata/ 2>/dev/null || true
      - name: Determine dist-tag
        id: tag
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          MAJOR="${TAG%%.*}"
          if [ "$MAJOR" = "1" ]; then
            echo "dist_tag=legacy" >> "$GITHUB_OUTPUT"
          else
            echo "dist_tag=latest" >> "$GITHUB_OUTPUT"
          fi
      - name: Publish
        working-directory: dist/ngx-dadata
        run: npm publish --access public --tag ${{ steps.tag.outputs.dist_tag }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
